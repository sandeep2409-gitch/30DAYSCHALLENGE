<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A premium, glassmorphic calculator with advanced mathematical parsing, instant live preview, responsive keypad grid, and dynamic calculation history.">
  <title>CalcuFrost // Premium Interactive Math Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="glow-orb orb-1" aria-hidden="true"></div>
  <div class="glow-orb orb-2" aria-hidden="true"></div>

  <main class="app-workspace">
    <div class="glass-container">
      
      <section class="calculator-pane" aria-label="Calculator Workspace">
        
        <header class="calc-header">
          <div class="brand">
            <div class="brand-dot" aria-hidden="true"></div>
            <h1 class="brand-title">Calcu<span>Frost</span></h1>
          </div>
          
          <div class="header-controls">
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle light and dark theme" title="Toggle Theme">
              <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
              </svg>
              <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
              </svg>
            </button>
            
            <button id="history-toggle" class="icon-btn mobile-only" aria-label="Toggle history log" title="Calculation History">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
            </button>
          </div>
        </header>

        <div class="display-wrapper">
          <div class="display-glass">
            <div class="expression-box" id="expression-container">
              <span id="expression-text" aria-live="polite"></span>
              <span class="cursor" id="calc-cursor" aria-hidden="true">|</span>
            </div>
            <div class="result-box">
              <output id="result-text" aria-live="polite">0</output>
            </div>
          </div>
        </div>

        <div class="keypad" role="grid" aria-label="Calculator Keyboard">
          <button class="btn btn-special" data-key="clear" id="btn-clear" aria-label="clear display">AC</button>
          <button class="btn btn-special" data-key="(" id="btn-open-paren" aria-label="open parenthesis">(</button>
          <button class="btn btn-special" data-key=")" id="btn-close-paren" aria-label="close parenthesis">)</button>
          <button class="btn btn-special btn-backspace" data-key="backspace" id="btn-backspace" aria-label="backspace">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
              <line x1="18" y1="9" x2="12" y2="15"></line>
              <line x1="12" y1="9" x2="18" y2="15"></line>
            </svg>
          </button>

          <button class="btn btn-number" data-key="7" aria-label="seven">7</button>
          <button class="btn btn-number" data-key="8" aria-label="eight">8</button>
          <button class="btn btn-number" data-key="9" aria-label="nine">9</button>
          <button class="btn btn-operator" data-key="/" id="btn-divide" aria-label="divided by">÷</button>

          <button class="btn btn-number" data-key="4" aria-label="four">4</button>
          <button class="btn btn-number" data-key="5" aria-label="five">5</button>
          <button class="btn btn-number" data-key="6" aria-label="six">6</button>
          <button class="btn btn-operator" data-key="*" id="btn-multiply" aria-label="multiplied by">×</button>

          <button class="btn btn-number" data-key="1" aria-label="one">1</button>
          <button class="btn btn-number" data-key="2" aria-label="two">2</button>
          <button class="btn btn-number" data-key="3" aria-label="three">3</button>
          <button class="btn btn-operator" data-key="-" id="btn-subtract" aria-label="minus">−</button>

          <button class="btn btn-number" data-key="negate" id="btn-negate" aria-label="toggle positive or negative">±</button>
          <button class="btn btn-number" data-key="0" aria-label="zero">0</button>
          <button class="btn btn-number" data-key="." aria-label="decimal point">.</button>
          <button class="btn btn-operator" data-key="+" id="btn-add" aria-label="plus">+</button>

          <button class="btn btn-special" data-key="%" id="btn-modulo" aria-label="modulo">%</button>
          <button class="btn btn-eval" data-key="=" id="btn-equals" aria-label="equals">=</button>
        </div>
      </section>

      <aside class="history-pane" id="history-pane" aria-label="Calculation History Log">
        <header class="history-header">
          <div class="history-title-group">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <h2 class="history-title">History Log</h2>
          </div>
          <button id="clear-history" class="icon-btn-text" aria-label="Clear all calculation history" title="Clear History">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            <span>Clear All</span>
          </button>
        </header>

        <div class="history-scroll-wrapper" id="history-scroll-container">
          <ul class="history-list" id="history-list">
          </ul>
          
          <div class="history-empty" id="history-empty-state">
            <div class="empty-svg-wrapper">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="9" x2="15" y2="9"></line>
                <line x1="9" y1="13" x2="15" y2="13"></line>
                <line x1="9" y1="17" x2="11" y2="17"></line>
              </svg>
            </div>
            <p class="empty-title">History is clean</p>
            <p class="empty-desc">Your mathematical calculations will be recorded here for instant reuse.</p>
          </div>
        </div>
      </aside>

    </div>
  </main>

  <dialog id="history-modal" class="premium-dialog">
    <div class="dialog-content">
      <h3 class="dialog-title">History Action</h3>
      <p class="dialog-desc">Select how you'd like to use this calculation in your active workspace:</p>
      
      <div class="dialog-formula-preview">
        <span id="modal-preview-expr" class="preview-expr"></span>
        <span id="modal-preview-res" class="preview-res"></span>
      </div>

      <div class="dialog-actions">
        <button id="dialog-use-expr" class="dialog-btn btn-primary">
          Restore Formula
        </button>
        <button id="dialog-use-res" class="dialog-btn btn-secondary">
          Insert Result at Cursor
        </button>
        <button id="dialog-close" class="dialog-btn btn-cancel">
          Cancel
        </button>
      </div>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
